<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Answer Evaluation - Input</title>
  <style>
    :root {
      --bg0: #0b1220;
      --bg1: #0b1324;
      --card: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.14);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.70);
      --primary: #06b6d4;
      --success: #22c55e;
      --danger: #ef4444;
      --shadow: 0 16px 40px rgba(0,0,0,0.35);
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% 0%, rgba(6,182,212,0.26), transparent 55%),
        radial-gradient(1000px 500px at 90% 20%, rgba(34,197,94,0.18), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { max-width: 1020px; margin: 0 auto; padding: 26px 18px 48px; }
    .topbar {
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .brand { display:flex; flex-direction:column; gap:2px; }
    .brand h1 { font-size: 16px; margin: 0; }
    .brand .sub { font-size: 12px; color: var(--muted); }
    .tabs {
      display:flex; gap:8px; align-items:center; flex-wrap: wrap;
    }
    .tab {
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--muted);
    }
    .tab.active { color: rgba(255,255,255,0.92); border-color: rgba(6,182,212,0.55); background: rgba(6,182,212,0.16); }
    .grid { display:grid; gap:14px; margin-top: 18px; }
    h2 { font-size: 14px; margin: 0 0 10px; }
    p { margin: 10px 0; color: var(--muted); }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    label { display: block; font-size: 12px; margin: 10px 0 6px; color: var(--muted); }
    input, textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      font-size: 14px;
      color: var(--text);
      background: rgba(12,18,32,0.55);
      outline: none;
    }
    textarea { min-height: 96px; resize: vertical; }
    input:focus, textarea:focus { border-color: rgba(6,182,212,0.65); box-shadow: 0 0 0 3px rgba(6,182,212,0.18); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 720px) { .row { grid-template-columns: 1fr; } }
    .btnrow { display:flex; gap:10px; margin-top: 12px; flex-wrap: wrap; }
    button {
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 12px;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    }
    button:hover { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.26); transform: translateY(-1px); }
    button:active { transform: translateY(0px); }
    .btn-primary { background: rgba(6,182,212,0.18); border-color: rgba(6,182,212,0.55); }
    .btn-primary:hover { background: rgba(6,182,212,0.24); border-color: rgba(6,182,212,0.70); }
    .msg {
      margin-top: 12px;
      font-size: 13px;
      white-space: pre-wrap;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: var(--muted);
    }
    .ok { color: rgba(34,197,94,0.95); border-color: rgba(34,197,94,0.35); background: rgba(34,197,94,0.10); }
    .err { color: rgba(239,68,68,0.95); border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.10); }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <h1>Automated Student Answer Evaluation</h1>
        <div class="sub">Gateway demo UI • Legacy single-question flow</div>
      </div>
      <div class="tabs">
        <span class="tab active">Input</span>
        <a class="tab" href="/results">Results</a>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>1) Create Question (Teacher)</h2>

    <label for="qText">Question</label>
    <textarea id="qText" placeholder="Enter the question text..."></textarea>

    <label for="expAns">Expected Answer</label>
    <textarea id="expAns" placeholder="Enter the expected answer..."></textarea>

        <div class="btnrow">
          <button id="btnCreate" class="btn-primary">Create Question</button>
        </div>
        <div id="createMsg" class="msg"></div>
      </div>

      <div class="card">
        <h2>2) Submit Student Answer (Student)</h2>

    <div class="row">
      <div>
        <label for="questionId">Question ID</label>
        <input id="questionId" type="number" min="1" placeholder="e.g., 1" />
      </div>
      <div>
        <label for="studentId">Student ID</label>
        <input id="studentId" type="text" placeholder="e.g., S1" />
      </div>
    </div>

    <label for="studAns">Student Answer</label>
    <textarea id="studAns" placeholder="Write the student's answer..."></textarea>

        <div class="btnrow">
          <button id="btnSubmit" class="btn-primary">Submit Answer</button>
        </div>
        <div id="submitMsg" class="msg"></div>
      </div>
    </div>
  </div>

<script>
  function setMsg(el, ok, text) {
    el.textContent = text;
    el.className = 'msg ' + (ok ? 'ok' : 'err');
  }

  async function postJson(url, body) {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const contentType = res.headers.get('content-type') || '';
    const data = contentType.includes('application/json') ? await res.json() : await res.text();

    if (!res.ok) {
      const detail = (data && data.detail) ? data.detail : (typeof data === 'string' ? data : JSON.stringify(data));
      throw new Error(detail);
    }
    return data;
  }

  document.getElementById('btnCreate').addEventListener('click', async () => {
    const msg = document.getElementById('createMsg');
    setMsg(msg, true, 'Submitting...');

    try {
      const question_text = document.getElementById('qText').value.trim();
      const expected_answer = document.getElementById('expAns').value.trim();
      if (!question_text || !expected_answer) throw new Error('Please enter question and expected answer.');

      const data = await postJson('/questions', { question_text, expected_answer });
      setMsg(msg, true, `Created. question_id = ${data.question_id}`);
      document.getElementById('questionId').value = data.question_id;
    } catch (e) {
      setMsg(msg, false, 'Error: ' + e.message);
    }
  });

  document.getElementById('btnSubmit').addEventListener('click', async () => {
    const msg = document.getElementById('submitMsg');
    setMsg(msg, true, 'Submitting...');

    try {
      const question_id = Number(document.getElementById('questionId').value);
      const student_id = document.getElementById('studentId').value.trim();
      const student_answer = document.getElementById('studAns').value.trim();
      if (!question_id || question_id < 1) throw new Error('Please enter a valid Question ID.');
      if (!student_id) throw new Error('Please enter Student ID.');
      if (!student_answer) throw new Error('Please enter Student Answer.');

      const data = await postJson('/answers', { question_id, student_id, student_answer });
      setMsg(msg, true, `Submitted. answer_id = ${data.answer_id}\nNow open Results page to evaluate.`);
    } catch (e) {
      setMsg(msg, false, 'Error: ' + e.message);
    }
  });
</script>
</body>
</html>
