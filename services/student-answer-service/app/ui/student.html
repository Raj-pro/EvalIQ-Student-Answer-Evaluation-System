<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Answer Service - Student</title>
  <style>
    :root {
      --bg0: #0b1220;
      --bg1: #0b1324;
      --card: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.14);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.70);
      --primary: #3b82f6;
      --success: #22c55e;
      --danger: #ef4444;
      --shadow: 0 16px 40px rgba(0,0,0,0.35);
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% 0%, rgba(59,130,246,0.30), transparent 55%),
        radial-gradient(1000px 500px at 90% 20%, rgba(34,197,94,0.18), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      min-height: 100vh;
    }
    .container { max-width: 1020px; margin: 0 auto; padding: 26px 18px 48px; }
    .topbar {
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .brand { display:flex; flex-direction:column; gap:2px; }
    .brand h1 { font-size: 16px; margin: 0; }
    .brand .sub { font-size: 12px; color: var(--muted); }
    .pill {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      white-space: nowrap;
    }
    .grid { display:grid; gap:14px; margin-top: 18px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    label { display: block; font-size: 12px; margin: 10px 0 6px; color: var(--muted); }
    input, textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      font-size: 14px;
      color: var(--text);
      background: rgba(12,18,32,0.55);
      outline: none;
    }
    textarea { min-height: 84px; resize: vertical; }
    input:focus, textarea:focus { border-color: rgba(59,130,246,0.65); box-shadow: 0 0 0 3px rgba(59,130,246,0.18); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 720px) { .row { grid-template-columns: 1fr; } }
    .btnrow { display:flex; gap:10px; margin-top: 12px; flex-wrap: wrap; }
    button {
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 12px;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    }
    button:hover { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.26); transform: translateY(-1px); }
    button:active { transform: translateY(0px); }
    .btn-primary { background: rgba(59,130,246,0.20); border-color: rgba(59,130,246,0.55); }
    .btn-primary:hover { background: rgba(59,130,246,0.26); border-color: rgba(59,130,246,0.70); }
    .btn-success { background: rgba(34,197,94,0.16); border-color: rgba(34,197,94,0.55); }
    .btn-success:hover { background: rgba(34,197,94,0.22); border-color: rgba(34,197,94,0.70); }
    .msg {
      margin-top: 12px;
      font-size: 13px;
      white-space: pre-wrap;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: var(--muted);
    }
    .ok { color: rgba(34,197,94,0.95); border-color: rgba(34,197,94,0.35); background: rgba(34,197,94,0.10); }
    .err { color: rgba(239,68,68,0.95); border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.10); }
    .testInfo {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.22);
      color: rgba(255,255,255,0.86);
    }
    .q {
      margin-top: 12px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
    }
    .title { font-weight: 650; letter-spacing: 0.2px; margin-bottom: 6px; }
    .qmeta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <h1>Student Answer Service</h1>
        <div class="sub">Student console • Load test, answer questions, submit in one go</div>
      </div>
      <div class="pill">UI • /ui</div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="row">
          <div>
            <label for="testId">Test ID</label>
            <input id="testId" placeholder="e.g., 01" />
          </div>
          <div>
            <label for="studentId">Student ID</label>
            <input id="studentId" placeholder="e.g., jay" />
          </div>
        </div>

        <div class="btnrow">
          <button id="btnLoad" class="btn-primary">Load Test</button>
        </div>
        <div id="loadMsg" class="msg"></div>

        <div id="testInfo" class="testInfo" style="display:none;"></div>
        <div id="questions"></div>

        <div class="btnrow">
          <button id="btnSubmit" class="btn-success" style="display:none;">Submit Test</button>
        </div>
        <div id="submitMsg" class="msg"></div>
      </div>
    </div>
  </div>

<script>
  let currentQuestions = [];

  function setMsg(el, ok, text) {
    el.textContent = text;
    el.className = 'msg ' + (ok ? 'ok' : 'err');
  }

  async function getJson(url) {
    const res = await fetch(url);
    const data = await res.json();
    if (!res.ok) throw new Error((data && data.detail) ? data.detail : JSON.stringify(data));
    return data;
  }

  async function postJson(url, body) {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error((data && data.detail) ? data.detail : JSON.stringify(data));
    return data;
  }

  function renderQuestions(questions) {
    const container = document.getElementById('questions');
    container.innerHTML = '';

    questions.forEach((q, idx) => {
      const div = document.createElement('div');
      div.className = 'q';
      div.innerHTML = `
        <div class="title">Q${idx + 1}</div>
        <div class="qmeta">question_id=${q.question_id}</div>
        <div style="margin-top:8px; color: rgba(255,255,255,0.88);">${q.question_text}</div>
        <label>Answer</label>
        <textarea data-qid="${q.question_id}" placeholder="Type your answer..."></textarea>
      `;
      container.appendChild(div);
    });
  }

  document.getElementById('btnLoad').addEventListener('click', async () => {
    const msg = document.getElementById('loadMsg');
    const testInfo = document.getElementById('testInfo');
    const btnSubmit = document.getElementById('btnSubmit');

    setMsg(msg, true, 'Loading...');
    testInfo.style.display = 'none';
    btnSubmit.style.display = 'none';

    try {
      const test_id = document.getElementById('testId').value.trim();
      if (!test_id) throw new Error('Enter Test ID');

      const data = await getJson(`/tests/${encodeURIComponent(test_id)}`);
      currentQuestions = data.questions || [];
      if (!currentQuestions.length) throw new Error('This test has no questions yet.');

      testInfo.textContent = `Test: ${data.test.test_id} | Title: ${data.test.title} | Teacher: ${data.test.teacher_id}`;
      testInfo.style.display = 'block';
      renderQuestions(currentQuestions);
      btnSubmit.style.display = 'inline-block';
      setMsg(msg, true, 'Loaded');
    } catch (e) {
      setMsg(msg, false, 'Error: ' + e.message);
    }
  });

  document.getElementById('btnSubmit').addEventListener('click', async () => {
    const msg = document.getElementById('submitMsg');
    setMsg(msg, true, 'Submitting...');

    try {
      const test_id = document.getElementById('testId').value.trim();
      const student_id = document.getElementById('studentId').value.trim();
      if (!test_id || !student_id) throw new Error('Enter Test ID and Student ID');

      const answers = Array.from(document.querySelectorAll('textarea[data-qid]')).map(t => ({
        question_id: Number(t.getAttribute('data-qid')),
        student_answer: (t.value || '').trim()
      }));

      if (answers.some(a => !a.student_answer)) throw new Error('Please answer all questions.');

      const resp = await postJson('/submissions', { test_id, student_id, answers });
      setMsg(msg, true, `Submitted. submission_id = ${resp.submission_id}\nNow evaluate from ML service UI (next step).`);
    } catch (e) {
      setMsg(msg, false, 'Error: ' + e.message);
    }
  });
</script>
</body>
</html>
